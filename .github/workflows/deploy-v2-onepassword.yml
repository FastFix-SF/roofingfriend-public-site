name: Deploy v2 (1Password-driven) to Vercel
on:
  push:
    branches: [main]
  workflow_dispatch: {}
concurrency:
  group: deploy-v2-roofingfriend
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - name: Pull build-time secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          VITE_SUPABASE_URL: op://7jxlzbawdroi5q7ay5j7s6glry/5dzmafbuoyjxrzvednun24kngm/url
          VITE_SUPABASE_PUBLISHABLE_KEY: op://7jxlzbawdroi5q7ay5j7s6glry/5dzmafbuoyjxrzvednun24kngm/anon_key
      - run: npm install --no-audit --no-fund --legacy-peer-deps
      - name: Write project.json
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json <<EOF
          {"projectId":"${{ secrets.VERCEL_PROJECT_ID_V2 }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}
          EOF
      - name: Vercel pull
        run: npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Vercel build
        run: npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy prebuilt
        run: npx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
