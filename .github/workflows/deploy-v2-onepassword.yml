name: Deploy v2 (1Password-driven) to Vercel
on:
  push:
    branches: [v2/onepassword-build]
  workflow_dispatch: {}
concurrency:
  group: deploy-v2-roofingfriend
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm install --no-audit --no-fund --legacy-peer-deps
      - run: npx vite build
      - name: Assemble Vercel output
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/* .vercel/output/static/
          cat > .vercel/output/config.json <<'EOF'
          {"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}
          EOF
      - name: Write project.json
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json <<EOF
          {"projectId":"${{ secrets.VERCEL_PROJECT_ID_V2 }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}
          EOF
      - name: Deploy prebuilt
        run: npx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
